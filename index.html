<style>

  .save{margin-top:12px;width:100%;background:var(--accent);border:none;color:#0B2545;font-weight:700;

  input.bad{border-color:var(--storm)!important}
  .msg{font-family:var(--mono);font-size:11px;color:var(--muted);padding:22px}
  .err{border:1px solid var(--storm);border-radius:6px;padding:13px;font-size:12px;line-height:1.6}
  .offnote{font-family:var(--mono);font-size:10px;color:var(--mar);margin-top:9px}
</style>

/* ================= render: dlaždice ================= */
function cloudTxt(c){ var t=T[CFG.lang]; return c==null?"":c<30?t.clear:c<70?t.part:t.cloud; }
function dayName(iso){
  var loc=CFG.lang==="en"?"en-GB":CFG.lang==="de"?"de-DE":"cs-CZ";
  var d=new Date(iso+"T12:00:00");
  return d.toLocaleDateString(loc,{weekday:"short"}).replace(".","")+" "+d.getDate()+".";
}
function arrow(dir){return '<span class="arw" style="display:inline-block;transform:rotate('+((dir+180)%360)+'deg)">↑</span>';}
function starStack(w,live,th){
  var n=live?stars(w,th):0, col=w>=(th[1]||9)?'var(--go)':'var(--mar)';
  var s='<span class="stk">';
  for(var i=0;i<th.length;i++) s+='<span style="color:'+(i<n?col:'rgba(255,255,255,.07)')+'">★</span>';
  return s+'</span>';
}
function lightUntil(sunsetIso){
  if(!sunsetIso) return "";
  var d=new Date(sunsetIso); d.setMinutes(d.getMinutes()-30);
  return String(d.getHours())+":"+String(d.getMinutes()).padStart(2,"0");
}
function confDot(c){
  if(!c) return "";
  var m={high:["●","var(--go)"],med:["◐","var(--mar)"],low:["○","var(--storm)"]}[c];
  return '<span class="conf" style="color:'+m[1]+'">'+m[0]+'</span>';
}
var MX=16;
function dayBlock(spot,si,date,di){
  var t=T[CFG.lang], th=CFG.starTh;
  var rec=(DATA[si]||{days:{}}).days[date]||[];
  var a=assess(rec,spot,CFG);
  if(!a) return "";
  var sunset=(DATA[si].sunset||{})[date];
  var winH=a.hrs;
  var cells=winH.map(function(x){
    var live=inSector(x.dir,spot.dirs);
    var barCol=!live?'var(--dim)':x.wind>=(spot.min!=null?spot.min:6)?'var(--spine)':x.wind>=5?'var(--mar)':'var(--dim)';
    var hw=Math.max(2,(Math.min(x.wind,MX)/MX)*24), hg=Math.max(hw,(Math.min(x.gust,MX)/MX)*24);
    var lab=x.hour%3===0;
    return '<div class="hr">'+
      '<div class="shw">'+(x.show>0.3?'🌧':'')+'</div>'+
      '<div class="hv">'+(lab?Math.round(convW(x.wind,CFG.unit)):'')+'</div>'+
      '<div class="bar"><div class="g" style="bottom:'+hg+'px"></div><div class="w" style="height:'+hw+'px;background:'+barCol+';opacity:'+(live?0.95:0.4)+'"></div></div>'+
      arrow(x.dir)+starStack(x.wind,live,th)+
      '<div class="hlab">'+(lab?x.hour:'')+'</div></div>';
  }).join('');
  var verd = a.v==="go" ? (a.runs.length>1?t.jede2:t.jede) : a.v==="mar"?t.mar : a.v==="storm"?t.storm
           : (a.noWind?t.nowind:t.baddir);
  var vc = a.v==="nic"?"nic":a.v;
  var wind;
  if(a.runs.length){
    wind=a.runs.map(function(w){
      return '<b>'+w.from+'–'+w.to+'h</b> '+convW(w.mean,CFG.unit).toFixed(1)+' '+unitLbl(CFG.unit)+
        ' '+compassP(w.dir,CFG.lang)+(w.g?' · '+w.g+' '+trm().u:'');
    }).join(' | ');
  } else if(a.v==="storm"){ wind=t.storm; }
  else { wind=t.max+' '+convW(a.peak,CFG.unit).toFixed(1)+' '+unitLbl(CFG.unit); }
  var mid=winH[Math.floor(winH.length/2)]||{};
  var env=[];
  if(mid.temp!=null) env.push('🌡 '+Math.round(convT(mid.temp,CFG.tunit))+'°');
  var ct=cloudTxt(mid.cloud); if(ct) env.push(ct);
  var lu=lightUntil(sunset); if(lu) env.push(t.light+' '+lu);
  var conf=(CONF[spot.id]||{})[date];
  return '<div class="day '+vc+'"><div class="dhead"><span class="dname">'+dayName(date)+'</span>'+
    confDot(conf)+'<span class="dverd '+vc+'">'+verd+'</span></div>'+
    '<div class="hours">'+cells+'</div>'+
    '<div class="dfoot"><span>'+wind+'</span><span>'+env.join(' · ')+'</span></div></div>';
}
function render(){
  applyLang();
  if(!DATA) return;
  var spots=effSpots(CFG);
  var scored=spots.map(function(s){
    var si=spots.indexOf(s);
    var best=0,bv="nic";
    var rank={go:3,mar:2,storm:1,nic:0};
    DATES.forEach(function(d){
      var a=assess((DATA[si]||{days:{}}).days[d]||[],s,CFG);
      if(a){ if(rank[a.v]>rank[bv])bv=a.v; if(a.score>best)best=a.score; }
    });
    return {s:s,si:si,score:best,bv:bv};
  });
  if(CFG.sort!=="custom") scored.sort(function(a,b){return b.score-a.score||a.s.km-b.s.km;});
  document.getElementById("out").innerHTML='<div class="grid">'+scored.map(function(r){
    var s=r.s;
    var wt = s.sea&&SST!=null ? '<br>🌊 '+Math.round(convT(SST,CFG.tunit))+'°' : '';
    return '<div class="spot '+r.bv+'" data-id="'+s.id+'">'+
      '<div class="shead"><div><span class="sname">'+esc(s.name)+'</span><div class="ssub">'+esc(s.sub)+'</div></div>'+
      '<div class="smeta">'+s.km+' km<span class="scog" data-ps="'+s.id+'">⚙</span>'+wt+'</div></div>'+
      DATES.map(function(d,di){return dayBlock(s,r.si,d,di);}).join('')+'</div>';
  }).join('')+'</div>'+(window.__off?'<div class="offnote">'+window.__off+'</div>':'');
}

/* ================= data ================= */
function fx(url){
  var ctrl=("AbortController"in window)?new AbortController():null, to=false;
  var timer=setTimeout(function(){to=true;if(ctrl)ctrl.abort();},12000);
  return fetch(url,ctrl?{signal:ctrl.signal,cache:"no-store"}:{cache:"no-store"})
    .then(function(r){clearTimeout(timer);if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .catch(function(e){clearTimeout(timer);throw to?new Error("timeout"):e;});
}
function load(){
  window.__off=null;
  document.getElementById("out").innerHTML='<div class="msg">'+T[CFG.lang].load+'</div>';
  var spots=effSpots(CFG);
  var main=spots.filter(function(s){return !s.model;});
  var custom=spots.filter(function(s){return s.model;});
  var seas=spots.filter(function(s){return s.sea;});
  var jobs=[ fx(urlMain(main)) ];
  jobs.push(custom.length?Promise.all(custom.map(function(s){return fx(urlModel([s],s.model)).catch(function(){return null;});})):Promise.resolve([]));
  jobs.push(fx(urlConf(spots)).catch(function(){return null;}));
  jobs.push(seas.length?fx(urlMarine(seas[0])).catch(function(){return null;}):Promise.resolve(null));
  Promise.all(jobs).then(function(res){
    var mainArr=Array.isArray(res[0])?res[0]:[res[0]];
    var byId={};
    main.forEach(function(s,i){ byId[s.id]=parseLoc(mainArr[i]); });
    custom.forEach(function(s,i){
      var r=res[1][i]; byId[s.id]=parseLoc(r?(Array.isArray(r)?r[0]:r):null);
    });
    DATA=spots.map(function(s){ return byId[s.id]||{days:{},sunset:{}}; });
    var first=DATA.filter(function(d){return Object.keys(d.days).length;})[0];
    DATES=first?Object.keys(first.days).sort().slice(0,4):[];
    CONF={};
    if(res[2]){
      var ca=Array.isArray(res[2])?res[2]:[res[2]];
      spots.forEach(function(s,i){
        var per=parseConfLoc(ca[i],CFG); CONF[s.id]={};
        for(var d in per) CONF[s.id][d]=confidence(per[d]);
      });
    }
    SST=null;
    if(res[3]&&res[3].daily&&res[3].daily.sea_surface_temperature_max)
      SST=res[3].daily.sea_surface_temperature_max[0];
    try{ localStorage.setItem("kite-cache-v2",JSON.stringify({DATA:DATA,DATES:DATES,CONF:CONF,SST:SST,
      when:new Date().toLocaleString("cs-CZ")})); }catch(e){}
    render();
  }).catch(function(e){
    var t=T[CFG.lang];
    var why=e.message==="timeout"?t.timeout:esc(e.message);
    var c=null; try{ c=JSON.parse(localStorage.getItem("kite-cache-v2")||"null"); }catch(e2){}
    if(c){ DATA=c.DATA;DATES=c.DATES;CONF=c.CONF||{};SST=c.SST;
      window.__off=fmt(t.offline,{t:c.when||"?"})+" ("+why+")"; render(); return; }
    document.getElementById("out").innerHTML='<div class="err"><strong>'+t.errT+'</strong> — '+why+t.errB+
      '<br><button class="rl" onclick="load()">'+t.retry+'</button></div>';
  });
}

/* ---- růžice: interaktivní, kreslí jeden oblouk ---- */
function drawRose(svgId, from, to, active){
  var cx=100,cy=100,R=76;
  function pt(d,r){var a=(d-90)*Math.PI/180;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];}
  function arc(a0,a1,r,c,o){var lg=((a1-a0+360)%360)>180?1:0,p0=pt(a0,r),p1=pt(a1,r);
    return '<path d="M'+cx+','+cy+' L'+p0[0].toFixed(1)+','+p0[1].toFixed(1)+' A'+r+','+r+' 0 '+lg+' 1 '+p1[0].toFixed(1)+','+p1[1].toFixed(1)+' Z" fill="'+c+'" opacity="'+o+'"/>';}
  var svg='';
  if(from!=null&&to!=null) svg+=arc(from,to,R,'#4FD0A0',0.24);
  svg+='<circle cx="100" cy="100" r="76" fill="none" stroke="#2A4A70"/>';
  [["S",0],["V",90],["J",180],["Z",270]].forEach(function(l){var o=pt(l[1],R+2),i=pt(l[1],R-8),tt=pt(l[1],R+13);
    svg+='<line x1="'+o[0]+'" y1="'+o[1]+'" x2="'+i[0]+'" y2="'+i[1]+'" stroke="#4E6E90"/>';
    svg+='<text x="'+tt[0]+'" y="'+(tt[1]+3)+'" text-anchor="middle" font-size="10" class="'+(l[0]==="S"?"lbl-n":"")+'">'+l[0]+'</text>';});
  if(from!=null){var p=pt(from,R);svg+='<line x1="100" y1="100" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="#DCE8F5" stroke-dasharray="3 2" opacity="0.7"/>';}
  if(to!=null){var q=pt(to,R);svg+='<line x1="100" y1="100" x2="'+q[0].toFixed(1)+'" y2="'+q[1].toFixed(1)+'" stroke="#DCE8F5" stroke-dasharray="3 2" opacity="0.7"/>';}
  document.getElementById(svgId).innerHTML=svg;
}
/* stav per-spot editoru */
var PS={ id:null, n:1, secs:[[null,null],[null,null]], click:[0,0] };
function angleFromEvent(svg,e){
  var r=svg.getBoundingClientRect();
  var x=(e.clientX-r.left)/r.width*200-100, y=(e.clientY-r.top)/r.height*200-100;
  var a=Math.atan2(y,x)*180/Math.PI+90; a=(a+360)%360;
  return Math.round(a/5)*5%360;
}
function psSync(){
  var parts=[];
  for(var i=0;i<PS.n;i++){ var sc=PS.secs[i]; if(sc[0]!=null&&sc[1]!=null) parts.push(sc[0]+"-"+sc[1]); }
  document.getElementById("ps_dirs").value=parts.join(",");
  drawRose("rose1",PS.secs[0][0],PS.secs[0][1]);
  if(PS.n===2) drawRose("rose2",PS.secs[1][0],PS.secs[1][1]);
}
function psFromText(){
  var d=parseDirs(document.getElementById("ps_dirs").value);
  PS.secs=[[null,null],[null,null]];
  if(d){ d.slice(0,2).forEach(function(a,i){PS.secs[i]=[a[0],a[1]];}); PS.n=d.length>1?2:1; }
  else PS.n=1;
  setNsec(PS.n,true);
}
function setNsec(n,skipSync){
  PS.n=n;
  document.querySelectorAll("#secseg span").forEach(function(sp){sp.classList.toggle("on",+sp.dataset.n===n);});
  document.getElementById("rose2").style.display=n===2?"":"none";
  if(!skipSync) psSync(); else { drawRose("rose1",PS.secs[0][0],PS.secs[0][1]); if(n===2)drawRose("rose2",PS.secs[1][0],PS.secs[1][1]); }
}
function roseClick(idx,e){
  var a=angleFromEvent(document.getElementById(idx===0?"rose1":"rose2"),e);
  if(PS.click[idx]===0){ PS.secs[idx][0]=a; PS.secs[idx][1]=null; PS.click[idx]=1; }
  else { PS.secs[idx][1]=a; PS.click[idx]=0; }
  psSync();
}
function openPS(id){
  PS.id=id; PS.click=[0,0];
  document.getElementById("ps_id").value=id;
  var base=BASE_SPOTS.concat(CFG.added||[]).filter(function(x){return x.id===id;})[0]||{};

  document.getElementById("ps_dirs").value=dirs?dirs.map(function(x){return x[0]+"-"+x[1];}).join(","):"";
  document.getElementById("ps_min").value=o.min!=null?o.min:(base.min!=null?base.min:6.0);
  document.getElementById("ps_wg").value=o.wg!==undefined?(o.wg||""):(base.wg||"");
  psFromText();
}
